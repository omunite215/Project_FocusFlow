services:
  - type: web
    name: focusflow-api
    runtime: python
    region: oregon
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./focusflow.db
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_data
      - key: CORS_ORIGINS
        sync: false
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /api/health
